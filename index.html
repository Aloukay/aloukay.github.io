<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mohammed Aloukay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
margin:0;
font-family:Poppins;
background:#000;
color:white;
overflow-x:hidden;
}

/* LOADING */
#loader {
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-size:30px;
color:#00e0ff;
}

/* NAV */
nav {
position:fixed;
width:100%;
padding:15px 10%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

/* HERO */
.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:0 10%;
position:relative;
}

/* BACKGROUND GLOW */
.hero::before {
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#00e0ff33,transparent);
top:20%;
left:40%;
animation:move 6s infinite alternate;
}

@keyframes move {
0% {transform:translate(-50px,-50px);}
100% {transform:translate(50px,50px);}
}

h1 {
font-size:55px;
background:linear-gradient(90deg,#00e0ff,#00ffa3);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */
.btn {
padding:10px 20px;
margin:10px 10px 0 0;
background:linear-gradient(90deg,#00e0ff,#00ffa3);
color:black;
border-radius:20px;
text-decoration:none;
transition:0.3s;
}
.btn:hover {transform:scale(1.1);}

/* SECTION */
section {padding:80px 10%;}

/* GRID */
.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card {
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
transition:0.3s;
}
.card:hover {transform:translateY(-10px);}

/* CURSOR */
.cursor {
width:20px;
height:20px;
border:2px solid #00e0ff;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
}

/* FADE */
.fade {opacity:0;transform:translateY(40px);transition:1s;}
.show {opacity:1;transform:translateY(0);}

</style>
</head>

<body>

<div id="loader">Loading...</div>
<div class="cursor" id="cursor"></div>

<nav>
<div><b>Aloukay</b></div>
</nav>

<section class="hero">

<h1>Mohammed Aloukay</h1>

<p id="typing"></p>

<div>
<a class="btn" href="#projects">Projects</a>
<a class="btn" href="Mohammed_Aloukay_CV.pdf" download>CV</a>
<a class="btn" href="mailto:M.Aloukay@gmail.com">Contact</a>
</div>

</section>

<section class="fade">
<h2>About</h2>
<p>17+ years at P&G leading automation and maintenance.</p>
</section>

<section id="projects" class="fade">
<h2>Projects</h2>
<div class="grid">
<div class="card">Reduced downtime by 14%</div>
<div class="card">Improved PLC performance</div>
<div class="card">Reduced cost by 30%</div>
</div>
</section>

<section class="fade">
<h2>Dashboard</h2>
<canvas id="chart"></canvas>
</section>

<script>

/* LOADER */
window.onload = () => {
document.getElementById("loader").style.display = "none";
}

/* TYPING */
const text="Driving Performance | Automation Leader | 98% Uptime";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}
type();

/* SCROLL */
const elements=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
elements.forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-100){
el.classList.add('show');
}
});
});

/* CURSOR */
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
cursor.style.left=e.clientX+'px';
cursor.style.top=e.clientY+'px';
});

/* CHART */
new Chart(document.getElementById('chart'),{
type:'line',
data:{
labels:['Start','Growth','Advanced','Leader'],
datasets:[{
data:[60,75,90,98],
borderColor:'#00e0ff'
}]
}
});

</script>

</body>
</html>
