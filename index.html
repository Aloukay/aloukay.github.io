<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mohammed Aloukay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #111827, #000);
    color: white;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 15px 10%;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

/* HERO */
.hero {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 10%;
}

/* TEXT EFFECT */
h1 {
    font-size: 50px;
    background: linear-gradient(90deg,#00e0ff,#00ffa3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* TYPING */
#typing {
    color: #00e0ff;
    font-size: 18px;
    margin-top: 10px;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    margin-right: 10px;
    padding: 10px 20px;
    background: linear-gradient(90deg,#00e0ff,#00ffa3);
    color: black;
    border-radius: 20px;
    text-decoration: none;
}

/* SECTIONS */
section { padding: 70px 10%; }

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

/* DASHBOARD */
.dashboard {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}
.dash-card {
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
    text-align:center;
}
.dash-card h3 { color:#00e0ff; }

/* ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}
.show {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<nav>
<div><b>Aloukay</b></div>
</nav>

<section class="hero">

<h1>Mohammed Aloukay</h1>

<p id="typing"></p>

<div>
<a class="btn" href="#projects">Projects</a>
<a class="btn" href="Mohammed_Aloukay_CV.pdf" download>CV</a>
<a class="btn" href="mailto:M.Aloukay@gmail.com">Contact</a>
</div>

</section>

<section class="fade">
<h2>About</h2>
<p>17+ years at Procter & Gamble leading automation, PLC, robotics and maintenance teams.</p>
</section>

<section id="projects" class="fade">
<h2>Projects</h2>
<div class="grid">
<div class="card">Reduced downtime by 14%</div>
<div class="card">Improved PLC performance</div>
<div class="card">Reduced cost by 30%</div>
</div>
</section>

<section class="fade">
<h2>Dashboard</h2>

<div class="dashboard">
<div class="dash-card"><h3>98%</h3><p>Uptime</p></div>
<div class="dash-card"><h3>30%</h3><p>Cost ↓</p></div>
<div class="dash-card"><h3>20%</h3><p>Downtime ↓</p></div>
</div>

<canvas id="chart1"></canvas>

</section>

<script>

/* TYPING EFFECT */
const text = "Driving 98%+ Uptime | -20% Downtime | Automation Leader";
let i = 0;
function typing(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}
typing();

/* SCROLL ANIMATION */
const elements = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
elements.forEach(el => {
if(el.getBoundingClientRect().top < window.innerHeight - 100){
el.classList.add('show');
}
});
});

/* CHART */
new Chart(document.getElementById('chart1'), {
type: 'line',
data: {
labels: ['Start','Growth','Advanced','Leader'],
datasets: [{
label: 'Career',
data: [60,75,90,98],
borderColor: '#00e0ff'
}]
}
});

</script>

</body>
</html>
